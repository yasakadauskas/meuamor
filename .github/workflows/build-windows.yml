name: Build Windows EXE

# Quando rodar:
#  - Sempre que houver um push na branch principal
#  - Manualmente, pelo botão "Run workflow" na aba Actions
#  - Ao criar uma tag começando com "v" (ex: v1.0) -> também publica numa Release
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Instalar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame pyinstaller

      - name: Gerar o executável (.exe)
        run: |
          python -m PyInstaller --onefile --windowed --name "RoteiroAfetivo" roteiro_afetivo.py

      - name: Disponibilizar o .exe para download
        uses: actions/upload-artifact@v4
        with:
          name: RoteiroAfetivo-Windows
          path: dist/RoteiroAfetivo.exe

      # Se você criar uma tag (ex: v1.0), o .exe também é anexado a uma Release
      - name: Publicar na Release (somente em tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RoteiroAfetivo.exe
